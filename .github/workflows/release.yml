name: Android Release CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: ['debug', 'release']
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Give permission to executable
        run: chmod +x gradlew

      - name: Assemble ${{ matrix.build_type }} APK
        run: |
          build_type=${{ matrix.build_type }}
          ./gradlew :app:assemble${build_type^}
      - name: Copy ${{ matrix.build_type }} APK
        run: |
          cp app/build/outputs/apk/${{ matrix.build_type }}/app-*.apk ./
      - name: Upload app-${{ matrix.build_type }} APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.build_type }}
          path: app-${{ matrix.build_type }}.apk

      #- name: Generate APK
      #  run: ./gradlew assemble${{ matrix.build-type }}

      #- name: Upload APK
      #  uses: actions/upload-artifact@master
      #  with:
      #    name: app-${{ matrix.build-type }}
          path: app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk
